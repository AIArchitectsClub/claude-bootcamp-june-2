services:
  # ── Backend ──────────────────────────────────────────────────────────────────
  - type: web
    name: tennis-booking-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && node scripts/init-db.js && node scripts/migrate-auth.js
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false          # set to https://<your-backend>.onrender.com
      - key: FRONTEND_URL
        sync: false          # set to https://<your-frontend>.onrender.com
      - key: NODE_ENV
        value: production

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: tennis-booking-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://<your-backend>.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
